<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CE Workflow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Surfaces */
        --bg-0: #f4f5f7;
        --bg-1: #ffffff;
        --bg-2: #f7f8fa;
        --bg-3: #eef0f3;
        --line:   #e3e6eb;
        --line-2: #d3d8df;

        /* Ink */
        --ink-0: #11161c;
        --ink-1: #3b4451;
        --ink-2: #6a7484;
        --ink-3: #98a1ad;

        /* Brand + status */
        --accent:      #0e95a8;
        --accent-dim:  rgba(14, 149, 168, 0.12);
        --accent-glow: rgba(14, 149, 168, 0.18);
        --ok:   #1f9d58;
        --warn: #c97a14;
        --err:  #d83a3a;
        --info: #2f6fda;

        --user-bubble: #d6f1f4;

        /* Radii */
        --r-sm: 4px;
        --r-md: 6px;
        --r-lg: 10px;
      }
    </style>
  </head>
  <body>
    <div id="app">
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
