<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CE Workflow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Surfaces */
        --bg-0: #f4f5f7;
        --bg-1: #ffffff;
        --bg-2: #f7f8fa;
        --bg-3: #eef0f3;
        --line:   #e3e6eb;
        --line-2: #d3d8df;

        /* Ink */
        --ink-0: #11161c;
        --ink-1: #3b4451;
        --ink-2: #6a7484;
        --ink-3: #98a1ad;

        /* Brand + status */
        --accent:      #0e95a8;
        --accent-dim:  rgba(14, 149, 168, 0.12);
        --accent-glow: rgba(14, 149, 168, 0.18);
        --ok:   #1f9d58;
        --warn: #c97a14;
        --err:  #d83a3a;
        --info: #2f6fda;

        --user-bubble: #d6f1f4;

        /* Theme-variant values */
        --accent-fg:      #ffffff;   /* text on --accent backgrounds */
        --brand-end:      #0a6f7e;   /* gradient end on brand mark / agent avatar */
        --code-text:      #0a6f7e;   /* inline code color */
        --strong-color:   #000000;   /* <strong> inside bubbles */
        --bubble-user-fg: #062a30;   /* user bubble text */
        --accent-hover:   #0a7e8e;   /* primary button hover bg */

        /* Radii */
        --r-sm: 4px;
        --r-md: 6px;
        --r-lg: 10px;
      }

      [data-theme="dark"] {
        /* Surfaces */
        --bg-0: #0c1014;
        --bg-1: #11161c;
        --bg-2: #161c24;
        --bg-3: #1d242d;
        --line:   #232c36;
        --line-2: #2c3742;

        /* Ink */
        --ink-0: #e7ecf2;
        --ink-1: #aab4c0;
        --ink-2: #6f7c8a;
        --ink-3: #4c5764;

        /* Brand + status */
        --accent:      #4dd0e1;
        --accent-dim:  rgba(77, 208, 225, 0.12);
        --accent-glow: rgba(77, 208, 225, 0.18);
        --ok:   #5fd38a;
        --warn: #ffb454;
        --err:  #ff6b6b;
        --info: #6aa9ff;

        --user-bubble: #1b3640;

        /* Theme-variant values */
        --accent-fg:      #07181b;
        --brand-end:      #2b8d9b;
        --code-text:      #b8edf3;
        --strong-color:   #ffffff;
        --bubble-user-fg: #e7ecf2;
        --accent-hover:   #6fdfee;
      }
    </style>
  </head>
  <body>
    <div id="app">
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
